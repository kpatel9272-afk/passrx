<style>
:root{--n:#0d1f3c;--t:#00a99d;--tb:#00e5d6;--tl:#e6f7f6;--c:#faf9f6;--m:#6b7280;--w:#fff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--c);color:var(--n);overflow-x:hidden;}
nav{position:fixed;top:0;left:0;right:0;z-index:99;display:flex;align-items:center;justify-content:space-between;padding:1rem 5%;background:rgba(250,249,246,.97);border-bottom:1px solid #eee;backdrop-filter:blur(10px);}
.logo{font-family:"Playfair Display",serif;font-size:1.5rem;color:var(--n);cursor:pointer;}.logo b{color:var(--t);}
.nav-links{display:flex;gap:1.5rem;list-style:none;}
.nav-links a{color:var(--m);font-size:.88rem;font-weight:500;cursor:pointer;transition:color .2s;}
.nav-links a:hover{color:var(--n);}
.nav-btn{background:var(--n);color:var(--w)!important;padding:.45rem 1.2rem;border-radius:6px;font-weight:600!important;}
.page{display:none;}.page.active{display:block;}
.hero{min-height:100vh;background:var(--n);display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:6rem 5% 4rem;gap:3rem;position:relative;overflow:hidden;}
.hero::after{content:"";position:absolute;top:-150px;right:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,169,157,.18),transparent 65%);pointer-events:none;}
.badge{display:inline-block;background:rgba(0,169,157,.15);border:1px solid rgba(0,169,157,.35);color:var(--t);font-size:.75rem;font-weight:700;padding:.35rem .9rem;border-radius:100px;margin-bottom:1.2rem;letter-spacing:.5px;text-transform:uppercase;}
.hero h1{font-family:"Playfair Display",serif;font-size:clamp(2.4rem,4vw,3.6rem);color:var(--w);line-height:1.15;margin-bottom:1.2rem;}
.hero h1 i{font-style:normal;color:var(--t);}
.hero p{color:rgba(255,255,255,.6);font-size:1rem;line-height:1.8;margin-bottom:2rem;font-weight:300;max-width:460px;}
.btn{display:inline-block;background:var(--t);color:var(--w);padding:.8rem 1.8rem;border-radius:8px;font-weight:600;font-size:.9rem;border:2px solid var(--t);transition:all .2s;cursor:pointer;text-decoration:none;}
.btn:hover{background:transparent;color:var(--t);}
.btn-ghost{display:inline-block;background:transparent;color:var(--w);padding:.8rem 1.8rem;border-radius:8px;font-weight:600;font-size:.9rem;border:2px solid rgba(255,255,255,.25);margin-left:.8rem;transition:all .2s;cursor:pointer;text-decoration:none;}
.btn-ghost:hover{border-color:var(--w);background:rgba(255,255,255,.07);}
.hero-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:2rem;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:1.1rem;text-align:center;}
.stat-n{font-family:"Playfair Display",serif;font-size:2rem;font-weight:700;color:var(--tb);display:block;}
.stat-l{color:rgba(255,255,255,.45);font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;margin-top:.2rem;}
.preview{background:var(--w);border-radius:10px;padding:1.2rem;}
.preview-t{font-family:"Playfair Display",serif;font-size:.9rem;color:var(--n);margin-bottom:.7rem;font-weight:700;}
.chip{display:inline-block;background:var(--tl);color:var(--t);font-size:.72rem;font-weight:600;padding:.25rem .7rem;border-radius:100px;margin:.15rem;}
.trust{background:var(--w);border-bottom:1px solid #eee;padding:1rem 5%;display:flex;justify-content:center;gap:2.5rem;flex-wrap:wrap;}
.ti{display:flex;align-items:center;gap:.5rem;color:var(--m);font-size:.83rem;font-weight:500;}
.ti span{color:var(--t);}
.section{padding:4.5rem 5%;border-bottom:1px solid #ebebeb;}
.section:nth-child(odd){background:var(--c);}
.section:nth-child(even){background:var(--w);}
.slbl{font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t);margin-bottom:.6rem;}
.stitle{font-family:"Playfair Display",serif;font-size:clamp(1.6rem,3vw,2.2rem);font-weight:700;color:var(--n);margin-bottom:.7rem;line-height:1.2;}
.ssub{color:var(--m);font-size:.95rem;line-height:1.8;max-width:520px;margin-bottom:2rem;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:3.5rem;align-items:start;}
.pcard{background:var(--w);border:1px solid #e5e5e5;border-radius:14px;max-width:500px;transition:all .3s;}
.pcard:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.08);border-color:var(--t);}
.pcard-hd{background:linear-gradient(135deg,var(--n),#1a3560);padding:1.5rem;border-radius:14px 14px 0 0;}
.pcard-tag{display:inline-block;background:rgba(0,169,157,.25);color:var(--t);font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:.2rem .7rem;border-radius:100px;margin-bottom:.8rem;}
.pcard-hd h3{font-family:"Playfair Display",serif;font-size:1.15rem;color:var(--w);margin-bottom:.4rem;}
.pcard-hd p{color:rgba(255,255,255,.5);font-size:.82rem;line-height:1.5;}
.pcard-tags{padding:1rem 1.5rem;display:flex;gap:.3rem;flex-wrap:wrap;border-bottom:1px solid #f3f3f3;}
.itag{background:#f3f4f6;color:#374151;font-size:.7rem;padding:.2rem .6rem;border-radius:5px;}
.pcard-body{padding:1.3rem 1.5rem;}
.price{font-family:"Playfair Display",serif;font-size:1.9rem;font-weight:700;color:var(--n);margin-bottom:.9rem;}
.price span{font-size:.82rem;font-family:"DM Sans",sans-serif;color:var(--m);font-weight:400;}
.save{display:inline-block;background:var(--tl);color:var(--t);font-size:.74rem;font-weight:600;padding:.18rem .6rem;border-radius:5px;margin-left:.4rem;vertical-align:middle;}
.delivery{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.8rem;color:#92400e;line-height:1.6;}
.delivery strong{color:#78350f;}
